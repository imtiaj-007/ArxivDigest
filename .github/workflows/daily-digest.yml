name: daily-digest

on:
  # 07:00 UTC daily ≈ 12:30 IST. Runs a few hours after arxiv's nightly drop
  # so the late submissions are in. Adjust once V0 ships.
  schedule:
    - cron: "0 7 * * *"

  # Manual trigger for ad-hoc runs + verifying the workflow without waiting for cron.
  workflow_dispatch:

concurrency:
  group: daily-digest
  cancel-in-progress: false # serialize, don't cancel — partial runs would be confusing

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  digest:
    name: Run daily digest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Gates all secrets/vars below to the `production` GH environment.
    # In repo Settings → Environments → production, lock to main branch and
    # populate the secrets/vars listed in docs/CI_SECRETS.md.
    environment: production
    defaults:
      run:
        working-directory: apps/agent
    env:
      # --- Secrets (sensitive — values hidden in logs) ---
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      # GEMINI_API_KEY intentionally not passed — Gemini free tier is exhausted,
      # so the run goes Groq-only. Re-add to re-enable MultiLLM failover.
      # VOYAGE_API_KEY no longer needed — embeddings are now local (BGE via
      # sentence-transformers). Kept as a secret so re-adding is one-line.
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}

      # --- Variables (non-sensitive — readable in logs) ---
      LANGFUSE_BASE_URL: ${{ vars.LANGFUSE_BASE_URL }}
      SENTRY_DSN: ${{ vars.SENTRY_DSN }}
      SENTRY_ENVIRONMENT: ${{ vars.SENTRY_ENVIRONMENT }}
      APP_ENV: ${{ vars.APP_ENV }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: apps/agent/uv.lock

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      # Cache the BGE model weights (~1.3 GB) across runs so the first call to
      # the embedder doesn't re-download from HuggingFace each cron.
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: hf-models-bge-large-en-v1.5

      - name: Run digest pipeline
        run: uv run arxivdigest run --daily
